name: Daily British Library Image

on:
  schedule:
    # Her gün saat 09:00 UTC'de çalışır
    - cron: '0 9 * * *'
  workflow_dispatch: # Manuel tetikleme için

jobs:
  fetch-and-analyze:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install requests pillow
          
      - name: Fetch and analyze image
        env:
          FLICKR_API_KEY: ${{ secrets.FLICKR_API_KEY }}
          HF_API_KEY: ${{ secrets.HF_API_KEY }}
        run: python scripts/fetch_image.py
        
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/daily-image.json
          git add public/images/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Daily image: $(date +'%Y-%m-%d')" && git push)
